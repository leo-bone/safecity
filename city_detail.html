<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{city_name}} - SafeCity 全球城市安全指南</title>
  <meta name="description" content="{{city_name}}安全评估、紧急联系、区域安全指南">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --card: #1a1a24;
      --card2: #22222e;
      --border: #2a2a3a;
      --text: #f0f0f5;
      --text2: #8888a0;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --green: #22c55e;
      --yellow: #eab308;
      --orange: #f97316;
      --red: #ef4444;
      --blue: #3b82f6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Hero */
    .hero {
      position: relative;
      height: 340px;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%),
                  var(--bg2) url(https://images.unsplash.com/photo-1480796927426-f609979314bd?w=1920) center/cover;
      display: flex;
      align-items: flex-end;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(2px);
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10,10,15,0.4) 0%, rgba(10,10,15,0.95) 100%);
    }
    .hero-content {
      position: relative;
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 24px 24px;
      width: 100%;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text2);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 20px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }
    .city-flag { font-size: 48px; margin-bottom: 12px; }
    .city-name { font-size: 42px; font-weight: 800; margin-bottom: 4px; }
    .city-name-en { font-size: 18px; color: var(--text2); margin-bottom: 12px; }
    .city-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 14px;
      color: var(--text2);
    }
    .city-meta span { display: flex; align-items: center; gap: 6px; }

    /* Score Banner */
    .score-banner {
      max-width: 1200px;
      margin: -40px auto 24px;
      padding: 0 24px;
      position: relative;
      z-index: 10;
    }
    .score-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      display: flex;
      align-items: center;
      gap: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .overall-score {
      text-align: center;
      padding-right: 32px;
      border-right: 1px solid var(--border);
    }
    .score-number {
      font-size: 64px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--green), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .score-grade {
      font-size: 24px;
      font-weight: 700;
      color: var(--green);
      margin-top: 4px;
    }
    .score-trend {
      font-size: 13px;
      color: var(--text2);
      margin-top: 8px;
    }
    .dimension-scores {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .dim-score {
      background: var(--bg2);
      border-radius: 12px;
      padding: 12px 16px;
    }
    .dim-name { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .dim-value { font-size: 22px; font-weight: 700; }
    .dim-value.high { color: var(--green); }
    .dim-value.medium { color: var(--yellow); }
    .dim-value.low { color: var(--orange); }

    /* Navigation Tabs - NEW LAYOUT */
    .nav-tabs {
      max-width: 1200px;
      margin: 0 auto 24px;
      padding: 0 24px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text2);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab-btn:hover { border-color: var(--accent); color: var(--text); }
    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Sections */
    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 40px;
      display: none;
    }
    .section.active { display: block; }
    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }

    /* ==================== */
    /* EMERGENCY TAB - NEW  */
    /* ==================== */
    .emergency-section { display: flex; flex-direction: column; gap: 24px; }

    /* Emergency Phone Cards */
    .emergency-phones {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }
    .emergency-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      transition: all 0.2s;
    }
    .emergency-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .emergency-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }
    .emergency-title {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 6px;
    }
    .emergency-number {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'SF Mono', monospace;
    }

    /* Subsections */
    .subsection {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }
    .subsection-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .subsection-title .icon { font-size: 20px; }

    /* Hospital Cards */
    .hospital-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }
    .hospital-card {
      background: var(--bg2);
      border-radius: 12px;
      padding: 16px;
      border-left: 3px solid var(--green);
    }
    .hospital-name { font-weight: 600; margin-bottom: 4px; }
    .hospital-address { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
    .hospital-phone { font-size: 14px; color: var(--accent); font-family: monospace; }
    .hospital-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .hospital-tag {
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
    }
    .emergency-tag {
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
    }

    /* Consulate Cards */
    .consulate-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .consulate-card {
      background: var(--bg2);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .consulate-info h4 { font-weight: 600; margin-bottom: 4px; }
    .consulate-info p { font-size: 13px; color: var(--text2); }
    .consulate-info .hours { font-size: 12px; color: var(--accent); margin-top: 4px; }
    .consulate-phone { color: var(--accent); font-family: monospace; white-space: nowrap; }

    /* Safety Apps */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
    }
    .app-item {
      background: var(--bg2);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .app-icon { font-size: 28px; }
    .app-info h4 { font-weight: 500; font-size: 14px; }
    .app-info p { font-size: 12px; color: var(--text2); }

    /* Self Protection */
    .selfprotect-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .selfprotect-card {
      background: var(--bg2);
      border-radius: 12px;
      padding: 16px;
    }
    .selfprotect-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .selfprotect-header .icon { font-size: 24px; }
    .selfprotect-header h4 { font-weight: 600; font-size: 15px; }
    .selfprotect-tips {
      list-style: none;
      padding-left: 0;
    }
    .selfprotect-tips li {
      font-size: 13px;
      color: var(--text2);
      padding: 6px 0;
      padding-left: 16px;
      position: relative;
    }
    .selfprotect-tips li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    /* Transport */
    .transport-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    .transport-card {
      background: var(--bg2);
      border-radius: 12px;
      padding: 16px;
    }
    .transport-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .transport-header .icon { font-size: 24px; }
    .transport-header h4 { font-weight: 600; }
    .transport-desc { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
    .transport-tips {
      list-style: none;
    }
    .transport-tips li {
      font-size: 12px;
      color: var(--green);
      padding: 3px 0;
      padding-left: 12px;
      position: relative;
    }
    .transport-tips li::before {
      content: '✓';
      position: absolute;
      left: 0;
    }

    /* ==================== */
    /* LIFESTYLE TAB - NEW  */
    /* ==================== */
    .lifestyle-section { display: flex; flex-direction: column; gap: 24px; }

    .food-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .food-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.2s;
    }
    .food-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .food-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .food-name { font-size: 16px; font-weight: 600; }
    .food-type {
      background: rgba(139, 92, 246, 0.15);
      color: var(--accent2);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
    }
    .food-price { font-size: 14px; color: var(--green); margin-bottom: 8px; }
    .food-desc { font-size: 14px; color: var(--text2); margin-bottom: 8px; }
    .food-tip {
      background: var(--bg2);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--yellow);
      border-left: 3px solid var(--yellow);
    }

    /* Food Safety Alert */
    .food-safety {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(249, 115, 22, 0.1));
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 16px;
      padding: 20px;
      margin-top: 16px;
    }
    .food-safety-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--orange);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .food-safety-list {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 8px;
    }
    .food-safety-list li {
      font-size: 13px;
      color: var(--text2);
      padding: 6px 0;
      padding-left: 20px;
      position: relative;
    }
    .food-safety-list li::before {
      content: '⚠️';
      position: absolute;
      left: 0;
    }

    /* Attractions */
    .attractions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .attraction-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    .attraction-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .attraction-type {
      font-size: 12px;
      color: var(--blue);
      margin-bottom: 8px;
    }
    .attraction-desc { font-size: 14px; color: var(--text2); margin-bottom: 8px; }
    .attraction-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--text2);
    }
    .attraction-meta span { display: flex; align-items: center; gap: 4px; }

    /* ==================== */
    /* OVERVIEW TAB         */
    /* ==================== */
    .overview-content { display: flex; flex-direction: column; gap: 24px; }
    .overview-intro {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }
    .overview-intro h3 { font-size: 16px; margin-bottom: 12px; }
    .overview-intro p { font-size: 14px; color: var(--text2); line-height: 1.8; }

    .safety-warnings {
      background: linear-gradient(135deg, rgba(234, 179, 8, 0.1), rgba(249, 115, 22, 0.1));
      border: 1px solid rgba(234, 179, 8, 0.3);
      border-radius: 16px;
      padding: 20px;
    }
    .safety-warnings h3 {
      font-size: 15px;
      color: var(--yellow);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .warning-list { list-style: none; }
    .warning-list li {
      font-size: 14px;
      color: var(--text2);
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .warning-list li:last-child { border-bottom: none; }

    /* Areas */
    .area-section { margin-top: 24px; }
    .area-section-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .area-section-title.safe { color: var(--green); }
    .area-section-title.caution { color: var(--yellow); }
    .area-section-title.danger { color: var(--red); }

    .area-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .area-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .area-name { font-weight: 600; margin-bottom: 6px; }
    .area-desc { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
    .area-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .area-tag {
      background: rgba(34, 197, 94, 0.15);
      color: var(--green);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
    }
    .area-tag.risk {
      background: rgba(245, 158, 11, 0.15);
      color: var(--yellow);
    }
    .area-tag.danger {
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
    }

    /* Tips */
    .tips-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .tips-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tips-list {
      list-style: none;
      padding-left: 0;
    }
    .tips-list li {
      font-size: 14px;
      color: var(--text2);
      padding: 8px 0;
      padding-left: 20px;
      position: relative;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .tips-list li:last-child { border-bottom: none; }
    .tips-list li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    /* Conflict */
    .conflict-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .conflict-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .conflict-card.high { border-left: 4px solid var(--red); }
    .conflict-card.medium { border-left: 4px solid var(--yellow); }
    .conflict-card.low { border-left: 4px solid var(--green); }
    .conflict-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .conflict-level { font-size: 12px; margin-bottom: 8px; }
    .conflict-level.high { color: var(--red); }
    .conflict-level.medium { color: var(--yellow); }
    .conflict-level.low { color: var(--green); }
    .conflict-desc { font-size: 13px; color: var(--text2); }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 24px;
      color: var(--text2);
      font-size: 13px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 768px) {
      .city-name { font-size: 28px; }
      .score-card { flex-direction: column; gap: 20px; }
      .overall-score { padding-right: 0; border-right: none; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
      .dimension-scores { grid-template-columns: repeat(2, 1fr); }
      .score-number { font-size: 48px; }
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <header class="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <a href="index.html" class="back-btn">← 返回首页</a>
      <div class="city-flag" id="city-flag">🏙️</div>
      <h1 class="city-name" id="city-name">加载中...</h1>
      <p class="city-name-en" id="city-name-en"></p>
      <div class="city-meta" id="city-meta"></div>
    </div>
  </header>

  <!-- Score Banner -->
  <div class="score-banner">
    <div class="score-card">
      <div class="overall-score">
        <div class="score-number" id="overall-score">--</div>
        <div class="score-grade" id="score-grade">-</div>
        <div class="score-trend" id="score-trend">综合安全评分</div>
      </div>
      <div class="dimension-scores" id="dimension-scores"></div>
    </div>
  </div>

  <!-- Navigation Tabs -->
  <nav class="nav-tabs">
    <button class="tab-btn active" data-tab="overview">📊 安全概览</button>
    <button class="tab-btn" data-tab="emergency">🚨 紧急联系</button>
    <button class="tab-btn" data-tab="areas">🗺️ 区域安全</button>
    <button class="tab-btn" data-tab="lifestyle">🍜 吃喝玩乐</button>
    <button class="tab-btn" data-tab="tips">💡 安全贴士</button>
  </nav>

  <main>
    <div class="loading" id="loading">加载安全数据中...</div>

    <!-- Overview Section -->
    <section class="section" id="section-overview">
      <div class="overview-content" id="overview-content"></div>
    </section>

    <!-- Emergency Section - REBUILT -->
    <section class="section" id="section-emergency">
      <div class="emergency-section" id="emergency-section"></div>
    </section>

    <!-- Areas Section -->
    <section class="section" id="section-areas">
      <div class="area-section">
        <h3 class="area-section-title safe">✅ 推荐安全区域</h3>
        <div class="area-grid" id="safe-areas"></div>
      </div>
      <div class="area-section">
        <h3 class="area-section-title caution">⚠️ 需注意区域</h3>
        <div class="area-grid" id="caution-areas"></div>
      </div>
      <div class="area-section">
        <h3 class="area-section-title danger">🚫 危险区域</h3>
        <div class="area-grid" id="danger-areas"></div>
      </div>
    </section>

    <!-- Lifestyle Section - REBUILT -->
    <section class="section" id="section-lifestyle">
      <div class="lifestyle-section" id="lifestyle-section"></div>
    </section>

    <!-- Tips Section -->
    <section class="section" id="section-tips">
      <div id="safety-tips-content"></div>
    </section>
  </main>

  <footer>
    <p>⚠️ 免责声明：本网站安全评分仅供参考，基于公开数据和综合评估，不构成专业安全建议。</p>
    <p>© 2026 SafeCity Global · <a href="https://safecity.uichain.org">safecity.uichain.org</a></p>
  </footer>

  <script src="data.js"></script>
  <script>
    // Get city from URL
    const urlParams = new URLSearchParams(window.location.search);
    const cityId = urlParams.get('city') || 'tokyo';

    // Find city data
    let city = CITY_DATABASE[cityId];

    if (!city) {
      document.body.innerHTML = '<div class="loading"><h2>城市数据未找到</h2><p>请返回首页选择城市</p></div>';
      throw new Error('City not found: ' + cityId);
    }

    // Update page title
    document.title = `${city.name} - SafeCity 全球城市安全指南`;
    document.getElementById('loading').style.display = 'none';

    // Render Hero
    const bgImage = city.image || `https://images.unsplash.com/photo-1480796927426-f609979314bd?w=1920`;
    document.getElementById('hero-bg').style.backgroundImage = `url(${bgImage})`;
    document.getElementById('city-flag').textContent = city.flag || '🏙️';
    document.getElementById('city-name').textContent = city.name;
    document.getElementById('city-name-en').textContent = city.nameEn || '';
    document.getElementById('city-meta').innerHTML = `
      <span>🌍 ${city.continent || ''}</span>
      <span>👥 ${city.population || ''}</span>
      <span>🗣️ ${city.language || ''}</span>
      <span>💰 ${city.currency || ''}</span>
      <span>🕐 ${city.timezone || ''}</span>
    `;

    // Render Score
    if (city.safetyIndex) {
      document.getElementById('overall-score').textContent = city.safetyIndex.overall || '--';
      document.getElementById('score-grade').textContent = city.safetyIndex.grade || '-';
      const trend = city.safetyIndex.trend;
      const trendText = trend === 'improving' ? '↗️ 改善中' : trend === 'declining' ? '↘️ 下降' : '→ 稳定';
      document.getElementById('score-trend').textContent = trendText;

      const dims = city.safetyIndex.dimensions;
      const dimNames = {
        crimeSafety: '犯罪安全',
        healthMedical: '医疗健康',
        transportSafety: '交通安全',
        naturalDisaster: '自然灾害',
        environmental: '环境安全',
        socialStability: '社会稳定'
      };
      let dimHtml = '';
      for (const [key, val] of Object.entries(dimNames)) {
        if (dims && dims[key]) {
          const score = dims[key].score || 0;
          const cls = score >= 80 ? 'high' : score >= 60 ? 'medium' : 'low';
          dimHtml += `
            <div class="dim-score">
              <div class="dim-name">${val}</div>
              <div class="dim-value ${cls}">${score}</div>
            </div>
          `;
        }
      }
      document.getElementById('dimension-scores').innerHTML = dimHtml;
    }

    // ========================
    // RENDER OVERVIEW
    // ========================
    function renderOverview() {
      const ec = city.emergencyContacts || {};
      const si = city.safetyIndex || {};
      let html = '';

      // Safety Overview Card
      html += `
        <div class="overview-intro">
          <h3>📍 城市安全总览</h3>
          <p>${city.name}（${city.nameEn || ''}）是${city.continent || ''}地区的重要城市。该城市综合安全评分为 ${si.overall || '--'} 分，
          安全等级为 ${si.grade || '-' || ''}。${si.dimensions?.crimeSafety?.note || '请参考各分项评分了解更多。'}</p>
        </div>
      `;

      // Key Warnings
      if (si.dimensions) {
        const warnings = [];
        for (const [key, val] of Object.entries(si.dimensions)) {
          if (val.score < 65) {
            const names = {
              crimeSafety: '犯罪安全',
              healthMedical: '医疗健康',
              transportSafety: '交通安全',
              naturalDisaster: '自然灾害',
              environmental: '环境安全',
              socialStability: '社会稳定'
            };
            warnings.push(`<strong>${names[key]}</strong>得分较低（${val.score}分）：${val.note || ''}`);
          }
        }
        if (warnings.length > 0) {
          html += `
            <div class="safety-warnings">
              <h3>⚠️ 需重点关注</h3>
              <ul class="warning-list">
                ${warnings.map(w => `<li>${w}</li>`).join('')}
              </ul>
            </div>
          `;
        }
      }

      // Areas
      const areas = city.areas || [];
      const safe = areas.filter(a => a.safety === 'safe' || a.rating >= 4);
      const caution = areas.filter(a => a.safety === 'caution' || (a.rating >= 2 && a.rating < 4));
      const danger = areas.filter(a => a.safety === 'danger' || a.rating < 2);

      let areasHtml = '';

      if (safe.length > 0) {
        areasHtml += `
          <div class="area-section">
            <h3 class="area-section-title safe">✅ 推荐安全区域</h3>
            <div class="area-grid">
              ${safe.map(a => `
                <div class="area-card">
                  <div class="area-name">${a.name}</div>
                  <div class="area-desc">${a.description || ''}</div>
                  <div class="area-tags">
                    ${(a.features || []).map(f => `<span class="area-tag">${f}</span>`).join('')}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      if (caution.length > 0) {
        areasHtml += `
          <div class="area-section">
            <h3 class="area-section-title caution">⚠️ 需注意区域</h3>
            <div class="area-grid">
              ${caution.map(a => `
                <div class="area-card">
                  <div class="area-name">${a.name}</div>
                  <div class="area-desc">${a.description || ''}</div>
                  <div class="area-tags">
                    ${(a.risks || []).map(f => `<span class="area-tag risk">${f}</span>`).join('')}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      if (danger.length > 0) {
        areasHtml += `
          <div class="area-section">
            <h3 class="area-section-title danger">🚫 危险区域</h3>
            <div class="area-grid">
              ${danger.map(a => `
                <div class="area-card">
                  <div class="area-name">${a.name}</div>
                  <div class="area-desc">${a.description || ''}</div>
                  <div class="area-tags">
                    ${(a.risks || []).map(f => `<span class="area-tag danger">${f}</span>`).join('')}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      html += areasHtml;
      document.getElementById('overview-content').innerHTML = html;
    }
    renderOverview();

    // ========================
    // RENDER EMERGENCY - NEW
    // ========================
    function renderEmergency() {
      const ec = city.emergencyContacts || {};
      let html = '';

      // 1. Emergency Phone Numbers
      html += '<div class="subsection">';
      html += '<h3 class="subsection-title"><span class="icon">📞</span>紧急求助电话</h3>';
      html += '<div class="emergency-phones">';

      const phones = ec.phoneNumbers || {};
      if (phones.police) {
        html += `
          <div class="emergency-card">
            <div class="emergency-icon">👮</div>
            <div class="emergency-title">报警电话</div>
            <div class="emergency-number">${phones.police}</div>
          </div>
        `;
      }
      if (phones.ambulance) {
        html += `
          <div class="emergency-card">
            <div class="emergency-icon">🚑</div>
            <div class="emergency-title">急救电话</div>
            <div class="emergency-number">${phones.ambulance}</div>
          </div>
        `;
      }
      if (phones.fire) {
        html += `
          <div class="emergency-card">
            <div class="emergency-icon">🚒</div>
            <div class="emergency-title">消防电话</div>
            <div class="emergency-number">${phones.fire}</div>
          </div>
        `;
      }
      if (phones.tourist) {
        html += `
          <div class="emergency-card">
            <div class="emergency-icon">🎒</div>
            <div class="emergency-title">旅游热线</div>
            <div class="emergency-number">${phones.tourist}</div>
          </div>
        `;
      }
      html += '</div></div>';

      // 2. Hospitals
      const hospitals = ec.hospitals || [];
      if (hospitals.length > 0) {
        html += '<div class="subsection">';
        html += '<h3 class="subsection-title"><span class="icon">🏥</span>推荐医院</h3>';
        html += '<div class="hospital-grid">';

        hospitals.forEach(h => {
          html += `
            <div class="hospital-card">
              <div class="hospital-name">${h.name}</div>
              <div class="hospital-address">${h.address || ''}</div>
              <div class="hospital-phone">📞 ${h.phone || ''}</div>
              <div class="hospital-tags">
                ${h.emergency24h ? '<span class="hospital-tag emergency-tag">24H急诊</span>' : ''}
                ${(h.features || []).map(f => `<span class="hospital-tag">${f}</span>`).join('')}
              </div>
            </div>
          `;
        });

        html += '</div></div>';
      }

      // 3. Consulates
      const consulates = ec.consulates || [];
      if (consulates.length > 0) {
        html += '<div class="subsection">';
        html += '<h3 class="subsection-title"><span class="icon">🏛️</span>使领馆信息</h3>';
        html += '<div class="consulate-list">';

        consulates.forEach(c => {
          html += `
            <div class="consulate-card">
              <div class="consulate-info">
                <h4>${c.name}</h4>
                <p>${c.address || ''}</p>
                ${c.hours ? `<p class="hours">🕐 ${c.hours}</p>` : ''}
              </div>
              <div class="consulate-phone">${c.phone || ''}</div>
            </div>
          `;
        });

        html += '</div></div>';
      }

      // 4. Safety Apps
      const safetyApps = ec.safetyApps || [];
      if (safetyApps.length > 0) {
        html += '<div class="subsection">';
        html += '<h3 class="subsection-title"><span class="icon">📱</span>安全防护App</h3>';
        html += '<div class="apps-grid">';

        safetyApps.forEach(app => {
          html += `
            <div class="app-item">
              <div class="app-icon">${app.icon || '📱'}</div>
              <div class="app-info">
                <h4>${app.name}</h4>
                <p>${app.description || ''}</p>
              </div>
            </div>
          `;
        });

        html += '</div></div>';
      }

      // 5. Self Protection Tips
      const selfProtection = ec.selfProtection || [];
      if (selfProtection.length > 0) {
        html += '<div class="subsection">';
        html += '<h3 class="subsection-title"><span class="icon">🛡️</span>自保安全指南</h3>';
        html += '<div class="selfprotect-grid">';

        selfProtection.forEach(sp => {
          html += `
            <div class="selfprotect-card">
              <div class="selfprotect-header">
                <span class="icon">${sp.icon || '•'}</span>
                <h4>${sp.title}</h4>
              </div>
              <ul class="selfprotect-tips">
                ${(sp.tips || []).map(t => `<li>${t}</li>`).join('')}
              </ul>
            </div>
          `;
        });

        html += '</div></div>';
      }

      // 6. Transport
      const transport = ec.transport || {};
      const modes = transport.modes || [];
      if (modes.length > 0) {
        html += '<div class="subsection">';
        html += '<h3 class="subsection-title"><span class="icon">🚇</span>交通出行指南</h3>';
        html += '<div class="transport-grid">';

        modes.forEach(m => {
          html += `
            <div class="transport-card">
              <div class="transport-header">
                <span class="icon">${m.icon || '•'}</span>
                <h4>${m.name}</h4>
              </div>
              <div class="transport-desc">${m.description || ''}</div>
              <ul class="transport-tips">
                ${(m.tips || []).map(t => `<li>${t}</li>`).join('')}
              </ul>
            </div>
          `;
        });

        html += '</div></div>';
      }

      document.getElementById('emergency-section').innerHTML = html || '<p style="color:var(--text2);padding:40px;text-align:center;">暂无紧急联系数据</p>';
    }
    renderEmergency();

    // ========================
    // RENDER LIFESTYLE - NEW
    // ========================
    function renderLifestyle() {
      const ls = city.lifestyle || {};
      let html = '';

      // Food
      const food = ls.food || [];
      if (food.length > 0) {
        html += '<div class="subsection">';
        html += '<h3 class="subsection-title"><span class="icon">🍜</span>必尝美食推荐</h3>';
        html += '<div class="food-grid">';

        food.forEach(item => {
          html += `
            <div class="food-card">
              <div class="food-header">
                <span class="food-name">${item.name}</span>
                <span class="food-type">${item.type || '美食'}</span>
              </div>
              ${item.price ? `<div class="food-price">💰 ${item.price}</div>` : ''}
              <div class="food-desc">${item.desc || item.description || ''}</div>
              ${item.tip ? `<div class="food-tip">💡 ${item.tip}</div>` : ''}
            </div>
          `;
        });

        html += '</div>';

        // Food Safety
        html += `
          <div class="food-safety">
            <div class="food-safety-title">⚠️ 食品安全注意事项</div>
            <ul class="food-safety-list">
              <li>选择干净卫生的餐厅用餐</li>
              <li>饮用瓶装水，避免直接饮用自来水</li>
              <li>街边小吃注意新鲜度和制作环境</li>
              <li>对海鲜过敏者请谨慎选择</li>
              <li>品尝当地生食前请确认食材新鲜度</li>
            </ul>
          </div>
        `;

        html += '</div>';
      }

      // Attractions
      const attractions = ls.attractions || [];
      if (attractions.length > 0) {
        html += '<div class="subsection">';
        html += '<h3 class="subsection-title"><span class="icon">🏛️</span>热门景点</h3>';
        html += '<div class="attractions-grid">';

        attractions.forEach(item => {
          html += `
            <div class="attraction-card">
              <div class="attraction-name">${item.name}</div>
              <div class="attraction-type">${item.type || '景点'}</div>
              <div class="attraction-desc">${item.description || ''}</div>
              ${item.bestTime ? `<div class="attraction-meta"><span>⏰ 最佳时间: ${item.bestTime}</span></div>` : ''}
            </div>
          `;
        });

        html += '</div></div>';
      }

      // Nightlife
      const nightlife = ls.nightlife || [];
      if (nightlife.length > 0) {
        html += '<div class="subsection">';
        html += '<h3 class="subsection-title"><span class="icon">🌙</span>夜生活推荐</h3>';
        html += '<div class="attractions-grid">';

        nightlife.forEach(item => {
          html += `
            <div class="attraction-card">
              <div class="attraction-name">${item.name}</div>
              <div class="attraction-type">${item.type || '夜生活'}</div>
              <div class="attraction-desc">${item.description || ''}</div>
              ${item.tips ? `<div class="attraction-meta"><span>💡 ${item.tips}</span></div>` : ''}
            </div>
          `;
        });

        html += '</div></div>';
      }

      document.getElementById('lifestyle-section').innerHTML = html || '<p style="color:var(--text2);padding:40px;text-align:center;">暂无生活数据</p>';
    }
    renderLifestyle();

    // ========================
    // RENDER TIPS
    // ========================
    function renderTips() {
      const st = city.safetyTips || city.emergencyContacts?.safety_tips || {};
      let html = '';

      if (st.general && st.general.length) {
        html += `
          <div class="tips-section">
            <div class="tips-title">📌 通用安全建议</div>
            <ul class="tips-list">
              ${st.general.map(t => `<li>${t}</li>`).join('')}
            </ul>
          </div>
        `;
      }

      if (st.emergency && st.emergency.length) {
        html += `
          <div class="tips-section">
            <div class="tips-title">🚨 紧急情况应对</div>
            <ul class="tips-list">
              ${st.emergency.map(t => `<li>${t}</li>`).join('')}
            </ul>
          </div>
        `;
      }

      if (st.special && st.special.length) {
        html += `
          <div class="tips-section">
            <div class="tips-title">🎯 特别注意事项</div>
            <ul class="tips-list">
              ${st.special.map(t => `<li>${t}</li>`).join('')}
            </ul>
          </div>
        `;
      }

      if (!html) {
        html = '<p style="color:var(--text2);padding:40px;text-align:center;">暂无安全贴士数据</p>';
      }

      document.getElementById('safety-tips-content').innerHTML = html;
    }
    renderTips();

    // Tab Navigation
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('section-' + btn.dataset.tab).classList.add('active');
      });
    });

    // Show first tab
    document.getElementById('section-overview').classList.add('active');
  </script>
</body>
</html>
